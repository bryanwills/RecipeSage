<ion-header>
  <ion-toolbar>
    <ion-title>{{
      "pages.mealPlanMealOrderModal.title" | translate
    }}</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="close()">
        <ion-icon name="close" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p>{{ "pages.mealPlanMealOrderModal.description" | translate }}</p>

  <ion-reorder-group (ionItemReorder)="onReorder($event)" disabled="false">
    @for (entry of entries; track $index) {
      @if ($index < entries.length - 1) {
        <div class="meal-entry">
          <button
            class="color-swatch"
            [style.background-color]="entry.color"
            [class.no-color]="!entry.color"
            (click)="toggleColorPicker($index)"
          ></button>
          <ion-item class="meal-entry-item">
            <ion-input
              label="{{
                'pages.mealPlanMealOrderModal.entryPlaceholder' | translate
              }}"
              labelPlacement="stacked"
              [(ngModel)]="entry.name"
              (ionInput)="onEntryInput($index)"
              type="text"
              [readonly]="entry.isDefault"
            ></ion-input>
          </ion-item>
          <ion-button
            fill="clear"
            size="small"
            color="medium"
            (click)="removeEntry($index)"
          >
            <ion-icon name="close-circle" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-reorder></ion-reorder>
        </div>

        @if (openColorPickerIndex === $index) {
          <div class="color-picker-container">
            <color-picker
              [color]="entry.color"
              (colorChange)="onColorChange($index, $event)"
            ></color-picker>
          </div>
        }
      }
    }
  </ion-reorder-group>

  <div class="meal-entry">
    <button class="color-swatch no-color"></button>
    <ion-item class="meal-entry-item">
      <ion-input
        label="{{
          'pages.mealPlanMealOrderModal.entryPlaceholder' | translate
        }}"
        labelPlacement="stacked"
        [(ngModel)]="entries[entries.length - 1].name"
        (ionInput)="onEntryInput(entries.length - 1)"
        type="text"
      ></ion-input>
    </ion-item>
  </div>
</ion-content>

<ion-footer class="ion-padding">
  <ion-button expand="block" (click)="save()">
    <ion-icon name="checkmark" slot="start"></ion-icon>
    <ion-label> {{ "generic.done" | translate }} </ion-label>
  </ion-button>
</ion-footer>
