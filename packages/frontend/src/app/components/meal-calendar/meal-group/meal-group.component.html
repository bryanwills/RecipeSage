@for (mealName of mealItems.meals; track mealName) {
  <div class="group">
    @if (mealItems.itemsByMeal[mealName].length > 0) {
      @if (isDefaultMeal(mealName)) {
        <span class="meal-title">{{
          mealNameToI18n(mealName) | translate
        }}</span>
      } @else {
        <span class="meal-title">{{ getDisplayName(mealName) }}</span>
      }
    }
    @for (mealItem of mealItems.itemsByMeal[mealName]; track mealItem) {
      <calendar-item
        [mealItem]="mealItem"
        (click)="itemClicked.emit(mealItem)"
        draggable="{{ enableEditing }}"
        (dragstart)="dragStart($event, mealItem)"
        (dragend)="dragEnd($event, mealItem)"
        [ngClass]="{ dragging: mealItemsDragging[mealItem.id] }"
        [style.border-left-color]="
          getMealBorderColor(mealItem.meal.toLowerCase())
        "
      ></calendar-item>
    }
  </div>
}
