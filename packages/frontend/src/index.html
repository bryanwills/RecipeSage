    <script>
      if (window.location.search) {
        if (window.location.hash && window.location.hash.includes("#/")) {
          window.location.href =
            window.location.href.replace(window.location.search, "") +
            window.location.search;
        }
      }
    </script>

    <script>
      window.addEventListener("beforeinstallprompt", (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredInstallPrompt = e;
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js", {
            updateViaCache: "none",
          })
          .then((registration) => {
            window.swRegistration = registration;
            if (window.onSWRegistration) window.onSWRegistration.call(null);
          })
          .catch((err) => console.error("Error", err));

        navigator.serviceWorker.addEventListener(
          "controllerchange",
          function () {
            // Recovery if we have a SW in a frozen state
            if (!window.appLoaded) {
              setTimeout(function () {
                if (!window.appLoaded) {
                  window.location.reload(true);
                }
              }, 2000);
            }
          },
        );
      }
    </script>

    <app-root></app-root>

    <script>
      let storedTheme = "default";
      try {
        // Backwards compat
        storedTheme = localStorage.getItem("theme") || storedTheme;

        storedTheme =
          JSON.parse(localStorage.getItem("preferences"))["global.theme"] ||
          storedTheme;
      } catch (e) {}
      switch (storedTheme) {
        case "black":
        case "dark":
        case "midnight":
        case "light":
          document.body.className += "theme-" + storedTheme;
          break;
        default:
          document.body.className += "theme-default";
          break;
      }
    </script>
